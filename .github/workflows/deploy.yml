name: DevOps Project CI/CD

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ca-central-1
  ECR_REPOSITORY: devops-project-app
  EKS_CLUSTER_NAME: devops-project-cluster

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build Docker image
      run: |
        docker build -t $ECR_REPOSITORY ./app

    - name: Scan image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.ECR_REPOSITORY }}
        format: table
        exit-code: 0
        severity: HIGH,CRITICAL

    - name: Tag and push image to ECR
      run: |
        ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
        docker tag $ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker tag $ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

    - name: Deploy to EKS
      run: |
        kubectl apply -f k8s/deployment.yml
        kubectl apply -f k8s/service.yml
        kubectl set image deployment/devops-project-app devops-project-app=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}

    - name: Verify deployment
      run: |
        kubectl rollout status deployment/devops-project-app --timeout=300s

    - name: Rollback on failure
      if: failure()
      run: |
        kubectl rollout undo deployment/devops-project-app
        echo "Deployment failed! Rolled back to previous version."