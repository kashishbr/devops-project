apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-project-app
  labels:
    app: devops-project-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-project-app
  template:
    metadata:
      labels:
        app: devops-project-app
    spec:
      containers:
      - name: devops-project-app
        image: 134875421691.dkr.ecr.ca-central-1.amazonaws.com/devops-project-app:latest
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5